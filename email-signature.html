<!--
  Softbox Email Signature Banner
  ─────────────────────────────────────────────────────
  HOW TO USE
  1. Open this file in a browser to preview.
  2. Copy everything between the COPY START / COPY END comments.
  3. Paste into your email client's HTML signature editor
     (Gmail → Settings → Signature → "Insert image / HTML").
  4. Replace "Your Name", "Your Role", and the email/phone fields.
  ─────────────────────────────────────────────────────
  All styles are inline — required for email client compatibility.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Softbox Email Signature</title>
  <style>
    body { margin: 40px; background: #f0f0f0; font-family: Arial, sans-serif; }
    .preview-label { font-size: 12px; color: #999; margin-bottom: 12px; }
    .preview-wrap { background: #ffffff; display: inline-block; padding: 24px; border-radius: 8px; }
  </style>
</head>
<body>
  <p class="preview-label">Preview (white area = what goes in the email):</p>
  <div class="preview-wrap">

  <!-- ══════════════ COPY START ══════════════ -->
  <table cellpadding="0" cellspacing="0" border="0" width="440"
         style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;max-width:440px;">
    <tr>

      <!-- Left colour bar -->
      <td width="4" style="width:4px;background:#6B4FE0;border-radius:3px 0 0 3px;">&nbsp;</td>

      <td style="padding:16px 20px 16px 18px;">

        <!-- ── Logo + wordmark ── -->
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin-bottom:12px;">
          <tr>

            <!-- Logo mark: big purple square + small teal square offset -->
            <td width="30" style="width:30px;vertical-align:middle;padding-right:10px;">
              <table cellpadding="0" cellspacing="0" border="0"
                     style="border-collapse:separate;border-spacing:2px;width:28px;">
                <tr>
                  <td width="17" height="17"
                      style="width:17px;height:17px;background:#6B4FE0;border-radius:3px;font-size:0;line-height:0;">&nbsp;</td>
                  <td width="9" height="17" style="width:9px;height:17px;">&nbsp;</td>
                </tr>
                <tr>
                  <td width="17" height="9" style="width:17px;height:9px;">&nbsp;</td>
                  <td width="9" height="9"
                      style="width:9px;height:9px;background:#00C4A7;border-radius:2px;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>
            </td>

            <!-- Wordmark -->
            <td style="vertical-align:middle;">
              <span style="font-size:22px;font-weight:700;color:#0d0c18;letter-spacing:-0.5px;line-height:1;">
                Soft<span style="color:#6B4FE0;">box</span>
              </span>
            </td>

          </tr>
        </table>

        <!-- ── Hairline divider ── -->
        <table cellpadding="0" cellspacing="0" border="0" width="100%"
               style="border-collapse:collapse;margin-bottom:12px;">
          <tr>
            <td height="1" style="height:1px;background:#e5e5ef;font-size:0;line-height:0;">&nbsp;</td>
          </tr>
        </table>

        <!-- ── Name & role ── -->
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin-bottom:10px;">
          <tr>
            <td>
              <span style="display:block;font-size:15px;font-weight:700;color:#0d0c18;line-height:1.3;">
                Pierce O'Rahilly
              </span>
              <span style="display:block;font-size:12px;color:#7a7a90;margin-top:3px;">
                Founder, Softbox
              </span>
            </td>
          </tr>
        </table>

        <!-- ── Contact links ── -->
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin-bottom:12px;">
          <tr>
            <td style="padding-right:14px;">
              <a href="mailto:pierceorahilly@softbox.ie"
                 style="font-size:12px;color:#6B4FE0;text-decoration:none;">pierceorahilly@softbox.ie</a>
            </td>
            <td style="padding-right:14px;font-size:12px;color:#c8c8d8;">|</td>
            <td style="padding-right:14px;">
              <a href="tel:+353833145451"
                 style="font-size:12px;color:#6B4FE0;text-decoration:none;">+353 83 314 5451</a>
            </td>
            <td style="padding-right:14px;font-size:12px;color:#c8c8d8;">|</td>
            <td>
              <a href="https://softbox.ie"
                 style="font-size:12px;color:#6B4FE0;text-decoration:none;">softbox.ie</a>
            </td>
          </tr>
        </table>

        <!-- ── Tagline badge ── -->
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
          <tr>
            <td style="background:#ede9fc;border-radius:20px;padding:4px 12px 5px;">
              <span style="font-size:11px;font-weight:600;color:#6B4FE0;letter-spacing:0.2px;">
                &#9670;&nbsp; Odoo Consulting &amp; Implementation
              </span>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
  <!-- ══════════════ COPY END ══════════════ -->

  </div>
</body>
</html>
